<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111b21;
      color: #e9edef;
      margin: 0;
    }
    /* === Login screen === */
    #no-user-section {
      padding: 20px 16px;
    }
    #no-user-section h2 {
      font-size: 16px;
      color: #00a884;
      margin: 0 0 12px 0;
    }
    #no-user-section label {
      font-size: 12px;
      color: #8696a0;
      display: block;
      margin-bottom: 4px;
    }
    #no-user-section input {
      width: 100%;
      padding: 8px 10px;
      background: #2a3942;
      border: 1px solid #3b4a54;
      border-radius: 8px;
      color: #e9edef;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 12px;
      transition: border-color 0.2s ease;
    }
    #no-user-section input:focus {
      border-color: #00a884;
      box-shadow: 0 0 0 3px rgba(0,168,132,0.12);
    }
    #no-user-section input::placeholder { color: #8696a0; }
    #no-user-section button {
      width: 100%;
      padding: 10px;
      background: #00a884;
      color: #111b21;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #no-user-section button:hover { background: #008f6f; }
    .status { font-size: 12px; margin-top: 8px; text-align: center; min-height: 16px; }
    .status.ok { color: #00a884; }
    .status.err { color: #ef4444; }

    /* === Logged-in screen === */
    #user-section { display: none; }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #2a3942;
    }
    .popup-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #008f6f);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #111b21;
      flex-shrink: 0;
    }
    .popup-user-name { font-size: 14px; font-weight: 600; }
    .popup-user-role { font-size: 11px; color: #8696a0; }

    .popup-body { padding: 12px 16px; }

    .popup-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(42,57,66,0.5);
    }
    .popup-info-row:last-child { border-bottom: none; }
    .popup-info-label { font-size: 11px; color: #8696a0; }
    .popup-info-value { font-size: 12px; color: #e9edef; text-align: right; }

    .popup-token-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .popup-token-text {
      font-family: monospace;
      font-size: 11px;
      color: #8696a0;
      cursor: pointer;
      transition: color 0.15s;
    }
    .popup-token-text:hover { color: #e9edef; }
    .popup-eye-btn {
      background: none;
      border: none;
      color: #8696a0;
      cursor: pointer;
      padding: 2px;
      width: auto;
      display: flex;
      align-items: center;
    }
    .popup-eye-btn:hover { color: #e9edef; background: none; }

    .popup-footer {
      padding: 10px 16px 14px;
      border-top: 1px solid #2a3942;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .popup-logout-btn {
      width: 100%;
      padding: 8px;
      background: #2a3942;
      color: #ef4444;
      border: 1px solid #3b4a54;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .popup-logout-btn:hover { background: #3b4a54; }
    .popup-dev {
      font-size: 9px;
      color: #3b4a54;
      text-align: center;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <!-- === Logged-in view === -->
  <div id="user-section" style="display:none">
    <div class="popup-header">
      <div class="popup-avatar" id="user-avatar"></div>
      <div>
        <div class="popup-user-name" id="user-name"></div>
        <div class="popup-user-role" id="user-role"></div>
      </div>
    </div>
    <div class="popup-body">
      <div class="popup-info-row">
        <span class="popup-info-label">Email</span>
        <span class="popup-info-value" id="user-email"></span>
      </div>
      <div class="popup-info-row">
        <span class="popup-info-label">Token</span>
        <div class="popup-token-row">
          <span class="popup-token-text" id="user-token" title="Clique para copiar"></span>
          <button class="popup-eye-btn" id="tokenEyeBtn" title="Mostrar/ocultar token">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="popup-info-row">
        <span class="popup-info-label">Versão</span>
        <span class="popup-info-value" id="version-label" style="color:#00a884;font-weight:600;font-family:monospace"></span>
      </div>
    </div>
    <!-- Admin-only section -->
    <div id="admin-section" style="display:none">
      <div style="padding:8px 16px 0;border-top:1px solid #2a3942">
        <label style="font-size:11px;color:#8696a0;display:block;margin-bottom:4px">Visualizar como</label>
        <select id="impersonateSelect" style="width:100%;padding:6px 8px;background:#2a3942;border:1px solid #3b4a54;border-radius:6px;color:#e9edef;font-size:12px;outline:none;cursor:pointer">
          <option value="">Meu perfil (admin)</option>
        </select>
        <div id="impersonateStatus" style="font-size:10px;color:#ff922b;margin-top:4px;min-height:14px"></div>
      </div>
    </div>
    <div class="popup-footer">
      <button id="toggleOverlayBtn" style="display:none;width:100%;padding:8px;background:#2a3942;color:#4d96ff;border:1px solid #3b4a54;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Esconder Overlay</button>
      <button class="popup-logout-btn" id="logoutBtn">Sair</button>
      <div class="popup-dev">Desenvolvido por Grupo Escalada Ltda.</div>
    </div>
  </div>

  <!-- === Login view === -->
  <div id="no-user-section" style="display:none">
    <h2>Conectar ao E-ZAP</h2>
    <label>Token de acesso</label>
    <input type="text" id="tokenInput" placeholder="WCRM-XXXX-XXXX-XXXX" spellcheck="false" autocomplete="off">
    <button id="tokenBtn">Entrar</button>
    <div class="status" id="tokenStatus"></div>
    <div class="popup-dev" style="margin-top:16px">Desenvolvido por Grupo Escalada Ltda.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
