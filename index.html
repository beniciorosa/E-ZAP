<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-ZAP — Novidades e Atualizações</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b1014;
      color: #e9edef;
      min-height: 100vh;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      background: #111b21;
      border-bottom: 1px solid #1e2d36;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px #25d36640;
    }

    .topbar-logo svg { width: 22px; height: 22px; fill: #fff; }

    .topbar-brand {
      font-size: 18px;
      font-weight: 700;
      color: #e9edef;
      letter-spacing: -0.3px;
    }

    .topbar-brand span {
      color: #8696a0;
      font-weight: 400;
      font-size: 14px;
      margin-left: 8px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-btn {
      background: #1e2d36;
      border: 1px solid #2a3942;
      color: #8696a0;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      transition: all 0.2s;
    }

    .topbar-btn:hover {
      background: #2a3942;
      color: #e9edef;
    }

    .topbar-btn svg { width: 16px; height: 16px; }

    /* ===== PAGE TITLE ===== */
    .page-title-section {
      padding: 32px 40px 24px;
      max-width: 1280px;
      margin: 0 auto;
    }

    .page-title-section h1 {
      font-size: 26px;
      font-weight: 700;
      color: #e9edef;
      letter-spacing: -0.5px;
    }

    .page-title-section p {
      font-size: 14px;
      color: #8696a0;
      margin-top: 6px;
    }

    /* ===== MAIN LAYOUT ===== */
    .changelog-layout {
      display: flex;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 40px 64px;
      gap: 0;
      min-height: calc(100vh - 180px);
    }

    /* ===== LEFT SIDEBAR — VERSION LIST ===== */
    .version-sidebar {
      width: 300px;
      min-width: 300px;
      padding-right: 0;
      position: relative;
    }

    .version-sidebar-inner {
      position: sticky;
      top: 80px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
      padding-right: 24px;
      scrollbar-width: thin;
      scrollbar-color: #2a3942 transparent;
    }

    .version-sidebar-inner::-webkit-scrollbar { width: 4px; }
    .version-sidebar-inner::-webkit-scrollbar-track { background: transparent; }
    .version-sidebar-inner::-webkit-scrollbar-thumb { background: #2a3942; border-radius: 4px; }

    .version-item {
      background: #111b21;
      border: 1px solid #1e2d36;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .version-item:hover {
      background: #1a2730;
      border-color: #2a3942;
    }

    .version-item.active {
      background: #12291f;
      border-color: #25d36650;
    }

    .version-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .version-item-badge {
      display: inline-block;
      background: #1e2d36;
      color: #e9edef;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      letter-spacing: 0.3px;
    }

    .version-item.active .version-item-badge,
    .version-item.current .version-item-badge {
      background: #25d36620;
      color: #25d366;
    }

    .version-item-current {
      display: none;
      color: #25d366;
    }

    .version-item-current svg { width: 18px; height: 18px; }

    .version-item.current .version-item-current {
      display: block;
    }

    .version-item-label {
      display: none;
      font-size: 11px;
      font-weight: 600;
      color: #25d366;
      margin-left: 4px;
    }

    .version-item.current .version-item-label {
      display: inline;
    }

    .version-item-date {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #8696a0;
      margin-top: 6px;
    }

    .version-item-date svg { width: 12px; height: 12px; opacity: 0.6; }

    /* ===== TIMELINE LINE ===== */
    .timeline-line {
      width: 3px;
      background: linear-gradient(180deg, #25d366 0%, #128c7e 30%, #0d6b5a 100%);
      border-radius: 3px;
      margin: 0 0;
      flex-shrink: 0;
      opacity: 0.6;
    }

    /* ===== RIGHT CONTENT ===== */
    .version-detail {
      flex: 1;
      padding-left: 32px;
      min-width: 0;
    }

    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: #8696a0;
      font-size: 15px;
    }

    /* Version detail header */
    .detail-header {
      background: #111b21;
      border: 1px solid #1e2d36;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .detail-header-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .detail-header-icon svg { width: 22px; height: 22px; fill: #fff; stroke: none; }

    .detail-header-info h2 {
      font-size: 22px;
      font-weight: 700;
      color: #e9edef;
      letter-spacing: -0.3px;
    }

    .detail-header-date {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #8696a0;
      margin-top: 3px;
    }

    .detail-header-date svg { width: 14px; height: 14px; opacity: 0.6; }

    .detail-current-badge {
      display: none;
      background: #25d36620;
      color: #25d366;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 6px;
      margin-left: 12px;
      letter-spacing: 0.5px;
    }

    .detail-header.is-current .detail-current-badge {
      display: inline-block;
    }

    /* Category sections */
    .category-section {
      margin-bottom: 24px;
    }

    .category-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #e9edef;
    }

    .category-title .cat-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .category-title.cat-feat { color: #25d366; }
    .category-title.cat-fix { color: #ff922b; }
    .category-title.cat-improve { color: #4dabf7; }
    .category-title.cat-infra { color: #9775fa; }
    .category-title.cat-breaking { color: #ff6b6b; }

    /* Change cards */
    .change-card {
      background: #111b21;
      border: 1px solid #1e2d36;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }

    .change-card:hover {
      border-color: #2a3942;
    }

    .change-card-title {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #e9edef;
      line-height: 1.5;
    }

    .change-card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .cat-feat .change-card-dot { background: #25d366; }
    .cat-fix .change-card-dot { background: #ff922b; }
    .cat-improve .change-card-dot { background: #4dabf7; }
    .cat-infra .change-card-dot { background: #9775fa; }
    .cat-breaking .change-card-dot { background: #ff6b6b; }

    .change-card-desc {
      font-size: 13px;
      color: #8696a0;
      line-height: 1.5;
      margin-top: 4px;
      padding-left: 18px;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid #1e2d36;
      font-size: 12px;
      color: #3b4a54;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 860px) {
      .changelog-layout {
        flex-direction: column;
        padding: 0 16px 48px;
      }

      .version-sidebar {
        width: 100%;
        min-width: 0;
      }

      .version-sidebar-inner {
        position: static;
        max-height: none;
        overflow-y: visible;
        padding-right: 0;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 16px;
        scrollbar-width: thin;
      }

      .version-item {
        min-width: 140px;
        flex-shrink: 0;
        margin-bottom: 0;
      }

      .timeline-line {
        display: none;
      }

      .version-detail {
        padding-left: 0;
      }

      .page-title-section {
        padding: 24px 16px 16px;
      }
    }

    @media (max-width: 480px) {
      .topbar { padding: 12px 16px; }
      .topbar-brand span { display: none; }
      .detail-header { padding: 16px; }
      .detail-header-info h2 { font-size: 18px; }
    }
  </style>
</head>

    // ===== STATE =====
    var selectedIdx = 0;

    // ===== RENDER VERSION LIST =====
    function renderVersionList() {
      var container = document.getElementById("versionList");
      var html = "";

      for (var i = 0; i < VERSIONS.length; i++) {
        var v = VERSIONS[i];
        var activeClass = i === selectedIdx ? " active" : "";
        var currentClass = v.current ? " current" : "";

        html += '<div class="version-item' + activeClass + currentClass + '" data-idx="' + i + '" onclick="selectVersion(' + i + ')">';
        html += '<div class="version-item-header">';
        html += '<div>';
        html += '<span class="version-item-badge">v' + v.version + '</span>';
        html += '<span class="version-item-label">Versão Atual</span>';
        html += '</div>';
        html += '<span class="version-item-current">' + CHECK_ICON + '</span>';
        html += '</div>';
        html += '<div class="version-item-date">' + CLOCK_ICON + ' ' + v.date + '</div>';
        html += '</div>';
      }

      container.innerHTML = html;
    }

    // ===== RENDER VERSION DETAIL =====
    function renderVersionDetail(idx) {
      var container = document.getElementById("versionDetail");
      var v = VERSIONS[idx];

      if (!v) {
        container.innerHTML = '<div class="detail-empty">Selecione uma versão</div>';
        return;
      }

      var currentClass = v.current ? " is-current" : "";
      var html = '';

      // Header
      html += '<div class="detail-header' + currentClass + '">';
      html += '<div class="detail-header-icon">' + TAG_ICON + '</div>';
      html += '<div class="detail-header-info">';
      html += '<h2>v' + v.version + '<span class="detail-current-badge">ATUAL</span></h2>';
      html += '<div class="detail-header-date">' + CLOCK_ICON + ' ' + v.date + '</div>';
      html += '</div>';
      html += '</div>';

      // Category sections
      for (var c = 0; c < v.changes.length; c++) {
        var group = v.changes[c];
        var catClass = CAT_CLASSES[group.type] || "cat-feat";
        var catIcon = CAT_ICONS[group.type] || CAT_ICONS.feat;
        var catLabel = group.title || CAT_LABELS[group.type] || "Outros";

        html += '<div class="category-section ' + catClass + '">';
        html += '<div class="category-title ' + catClass + '">';
        html += '<span class="cat-icon">' + catIcon + '</span>';
        html += catLabel;
        html += '</div>';

        for (var j = 0; j < group.items.length; j++) {
          var item = group.items[j];
          var itemTitle = "";
          var itemDesc = "";

          if (typeof item === "string") {
            // Legacy format: just a string
            var dashIdx = item.indexOf(" — ");
            if (dashIdx > -1) {
              itemTitle = item.substring(0, dashIdx);
              itemDesc = item.substring(dashIdx + 3);
            } else {
              itemTitle = item;
            }
          } else {
            itemTitle = item.title || "";
            itemDesc = item.desc || "";
          }

          html += '<div class="change-card">';
          html += '<div class="change-card-title">';
          html += '<span class="change-card-dot"></span>';
          html += '<span>' + itemTitle + '</span>';
          html += '</div>';
          if (itemDesc) {
            html += '<div class="change-card-desc">' + itemDesc + '</div>';
          }
          html += '</div>';
        }

        html += '</div>';
      }

      container.innerHTML = html;
    }

    // ===== SELECT VERSION =====
    function selectVersion(idx) {
      selectedIdx = idx;

      // Update sidebar active state
      var items = document.querySelectorAll(".version-item");
      for (var i = 0; i < items.length; i++) {
        items[i].classList.remove("active");
      }
      var target = document.querySelector('.version-item[data-idx="' + idx + '"]');
      if (target) target.classList.add("active");

      // Render detail
      renderVersionDetail(idx);
    }

    // ===== INIT =====
    renderVersionList();
    renderVersionDetail(0);
  </script>
